# tmux configuration generated by tmux.info
# https://tmux.info/tools/config-generator

# Env
set-environment -g PATH "/opt/homebrew/bin:/bin:/usr/bin"

# Enable Mouse Support
set -g mouse on

# Increase History Limit
set -g history-limit 50000

# Start Index at 1
set -g base-index 1
setw -g pane-base-index 1

# True Color Support
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Vim Navigation
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Reload Binding
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

bind e display-popup \
  -d "#{pane_current_path}" \
  -w 80% \
  -h 80% \
  -E "lazygit"

bind g command-prompt -p "Jump to window:" "select-window -t '%%'"

# Options
set -g set-titles on
set -g set-titles-string "#S"
set -g escape-time 0  # disable delays on escape sequences
set -g mouse on
set -g renumber-windows on  # keep numbering sequential
set -g automatic-rename on
set -g automatic-rename-format "#{?#{==:#{pane_current_command},nvim},#{s|.*/([^/]+/[^/]+)$|\\1|:pane_current_path},#{pane_current_command}}"
set -g repeat-time 1000  # increase "prefix-free" window

# Change prefix
unbind C-b
set -g prefix `
bind ` send-prefix

# TPM (Plugin Manager)
set -g @plugin 'rose-pine/tmux'
set -g @plugin 'tmux-plugins/tpm'

# Rose Pine Theme Settings
set -g @rose_pine_variant 'moon'
set -g @rose_pine_bar_bg_disable 'on'
set -g @rose_pine_bar_bg_disabled_color_option 'default'
set -g @rose_pine_window_status_separator " "

# Keybindings: panes
bind -r h resize-pane -L 5
bind -r j resize-pane -D 2
bind -r k resize-pane -U 2
bind -r l resize-pane -R 5

# Swap panes
bind -r H swap-pane -U
bind -r J swap-pane -D
bind -r K swap-pane -U
bind -r L swap-pane -D

bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

bind x kill-pane

# Keybindings: windows
bind n command-prompt -p "Window Name:" "new-window -c '#{pane_current_path}' -n '%%'"
bind X confirm-before -p "Oops! Kill window #W? (y/n)" kill-window
bind -n M-H previous-window
bind -n M-L next-window

bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9

# Keybindings: other
bind f resize-pane -Z
bind q detach-client
unbind /
bind / copy-mode \; send-key /  # Search pane content (forward)
bind B break-pane

# Unbind default prefix+s (choose-tree) and use for copy mode
bind s copy-mode

# Vim-style copy mode keybindings
setw -g mode-keys vi
bind -T copy-mode-vi J send-keys -X scroll-down
bind -T copy-mode-vi K send-keys -X scroll-up
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send-keys -X cancel

# Open pane contents in editor (fallback to vi if $EDITOR is empty)
bind S capture-pane -S - \; \
       save-buffer /tmp/tmux-buffer \; \
       delete-buffer \; \
       if-shell '[ -z "$EDITOR" ]' \
         'display-message "EDITOR not set, falling back to vi..."; new-window -n "tmux-output" "vi /tmp/tmux-buffer"' \
         'new-window -n "tmux-output" "$EDITOR /tmp/tmux-buffer"'

# Swap prefix+, and prefix+<
bind , display-menu -T "#[align=centre]#{window_index}:#{window_name}" -x W -y W "#{?#{>:#{session_windows},1},,-}Swap Left" l { swap-window -t :-1 } "#{?#{>:#{session_windows},1},,-}Swap Right" r { swap-window -t :+1 } "#{?pane_marked_set,,-}Swap Marked" s { swap-window } '' Kill X { kill-window } Respawn R { respawn-window -k } "#{?pane_marked,Unmark,Mark}" m { select-pane -m } Rename n { command-prompt -F -I "#W" { rename-window -t "#{window_id}" "%%" } } '' "New After" w { new-window -a } "New At End" W { new-window }
bind < command-prompt -I "#W" { rename-window "%%" }
  
unbind -n M-w
unbind -n M-a
unbind -n M-s
unbind -n M-d
bind -n M-f resize-pane -Z

# Initialize TPM (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

# --- Theme Overrides (Applied after plugins to ensure they take effect) ---

# Status bar general
set -g status-position bottom
set -g pane-border-status bottom
set -g pane-border-format ""
set -g pane-active-border-style "fg=blue"
set -g pane-border-style "fg=brightblack"

# Copy mode indicator and selection
set -g mode-style "bg=blue,fg=black"

set -g status-style bg=default
set -g status-left " "
set -g status-right "#{?client_prefix,#[fg=yellow]PREFIX ,}#[fg=brightblue,italics]#S #[fg=blue,dim,noitalics][ #[default]#[fg=brightblue,bold]#W #[fg=blue,dim,nobold]] "
set -g status-justify left

# Window status format (Dots)
set -g window-status-format "○"
set -g window-status-current-format "#[fg=#{?window_zoomed_flag,yellow,default}]●"

# Window status style
set -g window-status-style "bg=default"
set -g window-status-current-style "bg=default"
set -g window-status-bell-style "fg=red,nobold"

# Messages
set -g message-style bg=blue,fg=black,bright
set -g message-command-style bg=black,fg=blue,bright
